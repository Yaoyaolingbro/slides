# Part 1 &nbsp;|&nbsp; 价值导向

### 人生的意义，投资自己

</div>
</div>

<!--v-->

## Connecting the Dots

> 这个时代，人们是早熟的：这件事有没有用？值不值得做？

<br>

- 当下看起来"没用"的事，回头才发现是最重要的那个点
- 点和点的连线，只有站在未来才看得见
- **"吃亏是福"** —— 你以为在亏，其实在积累

<br>

<div class="big-quote">
「You can't connect the dots looking forward;<br>you can only connect them looking backwards.」<br>
<span style="font-size:0.7em; font-weight:400;">— Steve Jobs</span>
</div>

<!--v-->

## Love and Loss &nbsp;—&nbsp; 找到你热爱的

<br>

<div class="card-row">
<div class="card">
<span class="card-title">内卷的本质</span>

资源分配不均带来的焦虑。大家挤在同一赛道，因为那里资源最集中。
</div>
<div class="card">
<span class="card-title">但那真的是你要的吗？</span>

热爱不是一夜之间的顿悟——是在一个个经历里,慢慢感受出来的。
</div>
<div class="card">
<span class="card-title">怎么找到热爱</span>

不是提前想清楚，而是去经历、去感受。做得多了，自然会知道。
</div>
</div>

<br>

> 你那个"愿意免费去做的事"，就是值得投资的地方

<!--v-->

## Death &nbsp;—&nbsp; 坚守本心

<br>

<div class="big-quote">
死亡是每个人绕不开的终极命题<br>
<span style="font-size:0.72em; font-weight:400; color:#555;">它没有答案，但它有一个用处</span>
</div>

<br>

- 让你想清楚，**什么是真正重要的**
- 当站在终点回头看，那些因外部压力做的选择——值得吗？
- 不要因为别人的声音，活成别人的样子

<br>

> 人生最贵的投资，是投资自己

## 本博贯通意味着什么

> 是一种快速通道的途径

- 你无须花过的的精力，在一些繁琐的课程学习上，可以面向研究本生，进入到下一个阶段
- `every coin has two sides`，诚然会锁死你的未来；所以我会想说在接下来的这段时间里，大家可以更好的去感受，知道自己喜欢什么样的研究，喜欢什么样的导师，喜欢什么样的环境
- 在这个过程中，如果你觉得不适合了，随时调整，不要计较沉没成本

<br>

> 为什么是你？为什么是现在？

## AI 工具链

<div class="card-row">
<div class="card">
<span class="card-title">读论文</span>

- Semantic Scholar<br>找论文、理脉络
- Connected Papers<br>看引用关系图
- Claude / GPT<br>快速消化方法与难点
</div>
<div class="card">
<span class="card-title">写代码</span>

- Codex / Claude Code<br>辅助实现与 debug
- Copilot<br>代码补全加速
- <br>让 AI 帮你加速，<br>不是帮你写
</div>
<div class="card">
<span class="card-title">写论文</span>

- Claude / GPT<br>润色英文表达
- Grammarly<br>语法检查
- <br>从中文思路到<br>英文论文的最佳搭档
</div>
</div>

<br>

> 工具会用了，效率差距是 10 倍起

<!--v-->

## 几点建议

<br>

<div class="card-row">
<div class="card">
<span class="card-title">选题</span>
从导师方向出发，找自己感兴趣的交叉点
</div>
<div class="card">
<span class="card-title">跟导师</span>
主动汇报进展，不要等被问；有困难早说
</div>
<div class="card">
<span class="card-title">论文节奏</span>
复现 → 改进 → 独立提 idea<br>一步一步来
</div>
<div class="card">
<span class="card-title">别怕慢</span>
第一篇很难，（个人不建议自己独立完成），但之后会越来越成熟
</div>
</div>
